{% extends "base.html" %}
{% block title %}Calculate Nutrition | Nutrition Tracker{% endblock %}

{% block content %}
<h2 class="mt-3 mb-4">Calculate What You've Eaten</h2>

<div class="form-group">
    <label for="mealInput">Meal</label>
    <input type="text" id="mealInput" class="form-control meal-name-input" placeholder="Start typing a meal name...">
    <ul id="suggestionList" class="list-group"></ul>
</div>

<div class="form-group">
    <label for="mealAmount">Amount (grams)</label>
    <input type="number" id="mealAmount" class="form-control amount-input" placeholder="Enter amount" min="0" step="1">
</div>

<button id="addMealButton" class="btn btn-primary">Add Meal to List</button>
<ul id="addedMealsList" class="list-group mt-3"></ul>

<button id="calculateButton" class="btn btn-info mt-3">Calculate Total Nutrition</button>

<div id="totalNutritionDisplay" class="mt-4">
    <h3>Total Nutrition Calculated</h3>
    <p id="totalCalories"></p>
    <p id="totalCarbs"></p>
    <p id="totalProteins"></p>
    <p id="totalFats"></p>
</div>

<div id="chartsContainer" class="mt-5">
    <h3 class="mb-4">Your Daily Goals Progress</h3>
    <canvas id="nutritionGoalsChart"></canvas>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>window.USER_GOALS = {{ user_goals|tojson|safe }};</script>
<script src="{{ url_for('static', filename='js/calculate.js') }}"></script>
{% endblock %}
