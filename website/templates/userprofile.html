{% extends "base.html" %}
{% block title %}My Data | Nutrition Tracker{% endblock %}

{% block content %}
<h2>My Daily Goals</h2>
<p class="text-muted-light">Set your daily nutrition goals. Calories are recalculated from macros using 4/4/9 kcal per gram.</p>

<div class="form-group">
    <label for="carbsSlider">Carbs goal: <span id="carbsValue">{{ user.daily_carbs_goal }}</span>g</label>
    <input type="range" id="carbsSlider" min="0" max="600" value="{{ user.daily_carbs_goal }}" class="custom-range">
</div>
<div class="form-group">
    <label for="proteinsSlider">Proteins goal: <span id="proteinsValue">{{ user.daily_proteins_goal }}</span>g</label>
    <input type="range" id="proteinsSlider" min="0" max="300" value="{{ user.daily_proteins_goal }}" class="custom-range">
</div>
<div class="form-group">
    <label for="fatsSlider">Fats goal: <span id="fatsValue">{{ user.daily_fats_goal }}</span>g</label>
    <input type="range" id="fatsSlider" min="0" max="250" value="{{ user.daily_fats_goal }}" class="custom-range">
</div>

<div class="form-group">
    <label for="caloriesGoal">Calculated calories goal</label>
    <input type="number" id="caloriesGoal" class="form-control calorie-display" value="{{ user.daily_calories_goal|round(0)|int }}" readonly>
</div>

<button id="saveGoalsButton" class="btn btn-primary">Save Goals</button>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
