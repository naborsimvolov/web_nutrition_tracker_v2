<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nutrition Tracker{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
<div class="container-wrapper">
    <div class="vertical-center-container">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary w-100">
            <a class="navbar-brand mx-auto" href="{{ url_for('home.index') }}">Nutrition Tracker</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    {% if current_user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('nutrition_calculate.calculate') }}">Calculate Today</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('nutrition_management.manage_meals') }}">Meals</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('nutrition_history.nutrition_graphs') }}">History</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('user_profile.profile') }}">My Data</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a></li>
                    {% else %}
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.login') }}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.sign_up') }}">Sign Up</a></li>
                    {% endif %}
                </ul>
            </div>
        </nav>

        <main class="content-container text-white">
            <div class="container text-center py-5">
                <div id="message"></div>
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
